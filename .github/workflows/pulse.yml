name: Engine Pulse
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keep Engine Alive
        run: |
          # REPLACE 'fifa-core' WITH YOUR ACTUAL VERCEL PROJECT NAME AFTER DEPLOYMENT
          curl -s "https://fifa-core.vercel.app/api?action=track"
          echo "✅ Pulse sent successfully"
